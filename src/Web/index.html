<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; overflow: hidden; pointer-events: none; }
        body, html { 
            width: 100%; height: 100%; 
            background: transparent !important;
        }
        canvas { position: fixed; left: 0; top: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <canvas id="sparkCanvas"></canvas>
<script>
class MouseSpark {
    constructor(opts = {}) {
        this.color = opts.color || '45,175,255'; 
        this.scale = opts.scale || 1.5;
        this.maxTrail = opts.maxTrail || 16;
        this.el = opts.el || document.body;

        this.waves = [];
        this.sparks = [];
        this.trail = [];
        this.isDown = false;
        this.lastPos = null;

        this.initCanvas();
        this.bindEvents();
        this.loop();
    }

    initCanvas() {
        this.c = document.getElementById("sparkCanvas");
        this.ctx = this.c.getContext("2d");
        this.resize();
        window.addEventListener("resize", () => this.resize());
    }

    resize() {
        let dpr = window.devicePixelRatio || 1;
        this.c.width = window.innerWidth * dpr;
        this.c.height = window.innerHeight * dpr;
        this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    bindEvents() {
        const getPos = (e) => ({ x: e.clientX, y: e.clientY });
        const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

        window.addEventListener("mousedown", e => {
            this.isDown = true;
            this.lastPos = getPos(e);
            this.boom(this.lastPos.x, this.lastPos.y);
        });

        window.addEventListener("mousemove", e => {
            if (!this.isDown) return;
            const p = getPos(e);
            if (this.lastPos && dist(p, this.lastPos) > 2) {
                this.trail.push({ x: p.x, y: p.y, life: 1 });
                this.lastPos = p;
                if (this.trail.length > this.maxTrail) this.trail.shift();
                if (Math.random() < 0.3) {
                    let a = Math.random() * Math.PI * 2;
                    this.sparks.push({
                        x: p.x + Math.cos(a) * 10 * this.scale, 
                        y: p.y + Math.sin(a) * 10 * this.scale,
                        vx: Math.cos(a) * 1.3,
                        vy: Math.sin(a) * 1.3,
                        rot: Math.random() * Math.PI * 2,
                        rs: 0.16,
                        s: 9 * this.scale,
                        a: 0.7,
                        f: 0.95
                    });
                }
            }
        });

        window.addEventListener("mouseup", () => this.isDown = false);
    }

    boom(x, y) {
        this.waves.push({
            x, y, life: 0, max: 18, r: 0,
            ring: {
                ang: Math.random() * Math.PI * 2,
                segs: [
                    { off: -0.25 * Math.PI, len: 1.15 * Math.PI },
                    { off:  0.00 * Math.PI, len: 1.15 * Math.PI },
                    { off:  0.25 * Math.PI, len: 1.15 * Math.PI }
                ],
                life: 0, maxLife: 30, rs: 0.08
            }
        });

        for (let i = 0; i < 8; i++) {
            let a = Math.random() * Math.PI * 2;
            this.sparks.push({
                x, y,
                vx: Math.cos(a) * (4.8 + Math.random() * 2),
                vy: Math.sin(a) * (4.8 + Math.random() * 2),
                rot: Math.random() * Math.PI * 2,
                rs: (Math.random() - 0.5) * 0.28,
                s: (4 + Math.random() * 3) * this.scale,
                a: 1, f: 0.9
            });
        }
    }

    loop() {
        if (this.waves.length > 0 || this.sparks.length > 0 || this.trail.length > 0) {
            this.ctx.clearRect(0, 0, this.c.width, this.c.height);
            this.ctx.globalCompositeOperation = "lighter";

            for (let i = this.trail.length - 1; i >= 0; i--) {
                let t = this.trail[i];
                t.life -= this.isDown ? 0.085 : 0.18;
                if (t.life <= 0) this.trail.splice(i, 1);
            }

            if (this.trail.length > 1) {
                this.ctx.beginPath();
                this.ctx.moveTo(this.trail[0].x, this.trail[0].y);
                for (let i = 1; i < this.trail.length; i++) {
                    this.ctx.lineTo(this.trail[i].x, this.trail[i].y);
                }
                this.ctx.lineWidth = 4.5;
                this.ctx.strokeStyle = `rgba(${this.color},0.35)`;
                this.ctx.shadowBlur = 10;
                this.ctx.shadowColor = `rgba(${this.color},0.45)`;
                this.ctx.stroke();
                this.ctx.shadowBlur = 0;
            }

            for (let i = this.waves.length - 1; i >= 0; i--) {
                let w = this.waves[i];
                w.life++;
                let progress = w.life / w.max;
                let ease = 1 - Math.pow(1 - Math.min(progress, 1), 3);
                w.r = 26 * this.scale * ease;
                let alpha = Math.max(0, 1 - progress);
                if (alpha > 0) {
                    this.ctx.beginPath();
                    this.ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
                    this.ctx.fillStyle = `rgba(${this.color},${alpha})`;
                    this.ctx.shadowBlur = 10;
                    this.ctx.shadowColor = `rgba(${this.color},1)`;
                    this.ctx.fill();
                    this.ctx.shadowBlur = 0;
                }
                let r = w.ring;
                r.life++;
                let rProg = Math.min(r.life / r.maxLife, 1);
                r.ang -= r.rs;
                r.segs.forEach(seg => {
                    let shrink = Math.max(0, 1 - rProg);
                    let len = seg.len * shrink;
                    let start = r.ang + seg.off;
                    this.ctx.beginPath();
                    this.ctx.arc(w.x, w.y, w.r + 3 * this.scale, start, start + len);
                    this.ctx.lineWidth = 3.7;
                    this.ctx.strokeStyle = `rgba(245,248,252,${1 - rProg})`;
                    this.ctx.shadowBlur = 6;
                    this.ctx.shadowColor = `rgba(${this.color},0.75)`;
                    this.ctx.stroke();
                    this.ctx.shadowBlur = 0;
                });
                if (progress >= 1 && rProg >= 1) this.waves.splice(i, 1);
            }

            for (let i = this.sparks.length - 1; i >= 0; i--) {
                let s = this.sparks[i];
                s.x += s.vx; s.y += s.vy;
                s.vx *= s.f; s.vy *= s.f;
                s.rot += s.rs;
                s.a -= 0.032;
                if (s.a <= 0) { this.sparks.splice(i, 1); continue; }
                this.ctx.save();
                this.ctx.translate(s.x, s.y);
                this.ctx.rotate(s.rot);
                this.ctx.beginPath();
                this.ctx.moveTo(0, -s.s);
                this.ctx.lineTo(s.s * 0.6, s.s * 0.6);
                this.ctx.lineTo(-s.s * 0.6, s.s * 0.6);
                this.ctx.fillStyle = `rgba(255,255,255,${s.a})`;
                this.ctx.fill();
                this.ctx.restore();
            }
            this.ctx.globalCompositeOperation = "source-over";
        }
        requestAnimationFrame(() => this.loop());
    }
}

window.spark = new MouseSpark();

// C# 通信接口

let lastBoomX = -1, lastBoomY = -1;
let lastBoomTime = 0; 
let lastMoveX = -1, lastMoveY = -1;

window.externalBoom = (x, y) => {
    const now = Date.now();
    if (x === lastBoomX && y === lastBoomY && (now - lastBoomTime) < 25) {
        return; 
    }
    
    lastBoomX = x;
    lastBoomY = y;
    lastBoomTime = now;
    
    window.dispatchEvent(new MouseEvent('mousedown', { clientX: x, clientY: y, bubbles: true }));
};

window.externalMove = (x, y) => {
    if (x === lastMoveX && y === lastMoveY) return;
    lastMoveX = x;
    lastMoveY = y;
    window.dispatchEvent(new MouseEvent('mousemove', { clientX: x, clientY: y, bubbles: true }));
};

window.externalUp = () => {
    window.dispatchEvent(new MouseEvent('mouseup', { bubbles: true }));
};

window.updateColor = (rgbString) => {
    if (window.spark) window.spark.color = rgbString;
};
</script>
</body>
</html>
